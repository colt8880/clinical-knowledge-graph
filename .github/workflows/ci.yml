name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-tests:
    name: api-tests
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/password123
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password123 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: pip install -e "api[dev]"

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            if cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 "RETURN 1" 2>/dev/null; then
              echo "Neo4j is ready"
              exit 0
            fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 2
          done
          echo "Neo4j did not become ready"
          exit 1

      - name: Load constraints and seed
        run: |
          cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 -f graph/constraints.cypher
          cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 -f graph/seed.cypher

      - name: Run API tests
        working-directory: api
        run: pytest tests/ -v

  contract-lint:
    name: contract-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install jsonschema pyyaml openapi-spec-validator

      - name: Validate OpenAPI spec
        run: |
          python - <<'PYEOF'
          import yaml
          from openapi_spec_validator import validate
          with open("docs/contracts/api.openapi.yaml") as f:
              spec = yaml.safe_load(f)
          validate(spec)
          print("OpenAPI spec is valid")
          PYEOF

      - name: Validate JSON Schemas
        run: |
          python - <<'PYEOF'
          import json, glob, sys
          from jsonschema import Draft202012Validator, Draft7Validator

          errors = 0
          for path in sorted(glob.glob("docs/contracts/*.schema.json")):
              with open(path) as f:
                  schema = json.load(f)
              # Check it parses as valid JSON Schema
              try:
                  Draft7Validator.check_schema(schema)
                  print(f"  OK: {path}")
              except Exception as e:
                  print(f"  FAIL: {path} — {e}")
                  errors += 1

          if errors:
              print(f"\n{errors} schema(s) invalid")
              sys.exit(1)
          else:
              print(f"\nAll JSON Schemas valid")
          PYEOF

      - name: Validate predicate catalog
        run: |
          python - <<'PYEOF'
          import json, yaml, sys
          from jsonschema import validate, ValidationError

          with open("docs/contracts/predicate-catalog.yaml") as f:
              catalog = yaml.safe_load(f)
          print("predicate-catalog.yaml parses as valid YAML")

          with open("docs/contracts/predicate-catalog.schema.json") as f:
              schema = json.load(f)

          try:
              validate(instance=catalog, schema=schema)
              print("predicate-catalog.yaml validates against its JSON Schema")
          except ValidationError as e:
              print(f"Validation error: {e.message}")
              sys.exit(1)
          PYEOF

  graph-smoke:
    name: graph-smoke
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/password123
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password123 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            if cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 "RETURN 1" 2>/dev/null; then
              echo "Neo4j is ready"
              exit 0
            fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 2
          done
          echo "Neo4j did not become ready"
          exit 1

      - name: Load constraints and seed
        run: |
          cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 -f graph/constraints.cypher
          cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 -f graph/seed.cypher

      - name: Assert node and edge counts
        run: |
          echo "Checking node counts..."
          ACTUAL_NODES=$(cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 --format plain "MATCH (n) RETURN count(n)")
          echo "Total nodes: $ACTUAL_NODES"

          ACTUAL_EDGES=$(cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 --format plain "MATCH ()-[r]->() RETURN count(r)")
          echo "Total edges: $ACTUAL_EDGES"

          # Expected counts from seed.cypher:
          # Nodes: 1 Guideline + 3 Recommendation + 2 Strategy + 5 Condition + 4 Observation + 7 Medication + 1 Procedure = 23
          # Edges: 3 FROM_GUIDELINE + 3 OFFERS_STRATEGY + 8 INCLUDES_ACTION = 14
          EXPECTED_NODES=23
          EXPECTED_EDGES=14

          FAIL=0

          if echo "$ACTUAL_NODES" | grep -q "$EXPECTED_NODES"; then
            echo "Node count OK: $EXPECTED_NODES"
          else
            echo "MISMATCH: expected $EXPECTED_NODES nodes, got: $ACTUAL_NODES"
            FAIL=1
          fi

          if echo "$ACTUAL_EDGES" | grep -q "$EXPECTED_EDGES"; then
            echo "Edge count OK: $EXPECTED_EDGES"
          else
            echo "MISMATCH: expected $EXPECTED_EDGES edges, got: $ACTUAL_EDGES"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "Detailed breakdown:"
            cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 --format plain "MATCH (n) RETURN labels(n)[0] AS label, count(n) AS count ORDER BY label"
            cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 --format plain "MATCH ()-[r]->() RETURN type(r) AS type, count(r) AS count ORDER BY type"
            exit 1
          fi

          echo ""
          echo "Graph smoke test passed: $EXPECTED_NODES nodes, $EXPECTED_EDGES edges"
