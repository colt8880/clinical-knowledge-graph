name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install API dependencies
        run: |
          cd api
          pip install -e ".[test]"

      - name: Run API unit tests
        run: |
          cd api
          pytest tests/unit -v --tb=short

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Run UI unit tests
        run: |
          cd ui
          npm test -- --passWithNoTests

  integration:
    name: integration
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install API dependencies
        run: |
          cd api
          pip install -e ".[test]"

      - name: Run integration tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
        run: |
          cd api
          pytest tests/integration -v --tb=short

  eval:
    name: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install API dependencies
        run: |
          cd api
          pip install -e ".[test]"

      - name: Run eval fixtures
        run: |
          cd api
          pytest tests/eval -v --tb=short

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and start services
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Install Playwright
        run: |
          cd ui
          npm ci
          npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: |
          cd ui
          npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Stop services
        if: always()
        run: docker compose down
