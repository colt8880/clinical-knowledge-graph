const details = document.getElementById('details');

function renderEmpty() {
  details.innerHTML = '<div class="empty">Click any node or edge to see details.</div>';
}

function renderAttrRow(key, value) {
  let display;
  if (value === null || value === undefined) {
    display = '<span style="color:#94a3b8">null</span>';
  } else if (Array.isArray(value)) {
    if (value.length === 0) display = '<span style="color:#94a3b8">[]</span>';
    else if (typeof value[0] === 'object') display = '<pre>' + escapeHtml(JSON.stringify(value, null, 2)) + '</pre>';
    else display = value.map(v => '<span class="chip">' + escapeHtml(v) + '</span>').join('');
  } else if (typeof value === 'object') {
    display = '<pre>' + escapeHtml(JSON.stringify(value, null, 2)) + '</pre>';
  } else if (key === 'clinical_nuance') {
    display = '<div class="nuance">' + escapeHtml(value) + '</div>';
  } else if (typeof value === 'string' && value.startsWith('http')) {
    display = '<a href="' + escapeHtml(value) + '" target="_blank" style="color:#1e40af; word-break:break-all">' + escapeHtml(value) + '</a>';
  } else {
    display = escapeHtml(String(value));
  }
  return '<div class="attr-row"><div class="attr-key">' + escapeHtml(key) + '</div><div class="attr-val">' + display + '</div></div>';
}

function renderAttrBlock(attrs) {
  if (!attrs || Object.keys(attrs).length === 0) return '<div class="empty" style="padding:12px 0; text-align:left">No attributes</div>';
  return '<div class="attr-list">' + Object.entries(attrs).map(([k, v]) => renderAttrRow(k, v)).join('') + '</div>';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function renderNode(node) {
  const d = node.data();
  const color = typeColors[d.type];
  details.innerHTML = `
    <h2>Node</h2>
    <h3>${escapeHtml(d.id)}</h3>
    <div class="type-badge" style="background:${color.bg}; color:${color.border}; border:1px solid ${color.border}">${escapeHtml(d.type)}</div>
    <div class="section">
      <h2>Attributes</h2>
      ${renderAttrBlock(d.attrs)}
    </div>
    <div class="section">
      <h2>Connections</h2>
      <div class="attr-list">
        <div class="attr-row"><div class="attr-key">Incoming</div><div class="attr-val">${node.incomers('edge').length} edges</div></div>
        <div class="attr-row"><div class="attr-key">Outgoing</div><div class="attr-val">${node.outgoers('edge').length} edges</div></div>
      </div>
    </div>
  `;
}

function renderEdge(edge) {
  const d = edge.data();
  const color = edgeColors[d.type] || '#64748b';
  const src = cy.getElementById(d.source).data();
  const tgt = cy.getElementById(d.target).data();
  details.innerHTML = `
    <h2>Edge</h2>
    <h3>${escapeHtml(d.type)}</h3>
    <div class="type-badge" style="background:${color}20; color:${color}; border:1px solid ${color}">${escapeHtml(d.type)}</div>
    <div class="section">
      <h2>Source → Target</h2>
      <div class="attr-list">
        <div class="attr-row"><div class="attr-key">From</div><div class="attr-val"><strong>${escapeHtml(src.label.replace(/\n/g,' '))}</strong><br><span style="color:#64748b; font-size:12px">${escapeHtml(src.id)} (${escapeHtml(src.type)})</span></div></div>
        <div class="attr-row"><div class="attr-key">To</div><div class="attr-val"><strong>${escapeHtml(tgt.label.replace(/\n/g,' '))}</strong><br><span style="color:#64748b; font-size:12px">${escapeHtml(tgt.id)} (${escapeHtml(tgt.type)})</span></div></div>
      </div>
    </div>
    <div class="section">
      <h2>Attributes</h2>
      ${renderAttrBlock(d.attrs)}
    </div>
  `;
}

// Focus: root node + all descendants (outgoing successors, recursive) and edges between them.
// Everything else is faded (not hidden — hidden is reserved for the filter controls).
function focusOnNode(n) {
  cy.elements().removeClass('faded focus-root');
  const subtree = n.successors().union(n);
  // Only include edges that connect two nodes inside the subtree (avoids edges to incoming parents).
  const subtreeNodes = subtree.nodes();
  const internalEdges = subtreeNodes.connectedEdges().filter(e =>
    subtreeNodes.contains(e.source()) && subtreeNodes.contains(e.target())
  );
  const focusSet = subtreeNodes.union(internalEdges);
  cy.elements().not(focusSet).addClass('faded');
  n.addClass('focus-root');
}

cy.on('tap', 'node', evt => {
  focusOnNode(evt.target);
  renderNode(evt.target);
});

cy.on('tap', 'edge', evt => {
  cy.elements().removeClass('faded focus-root');
  const e = evt.target;
  const ends = e.connectedNodes().union(e);
  cy.elements().not(ends).addClass('faded');
  renderEdge(e);
});

cy.on('tap', evt => {
  if (evt.target === cy) {
    cy.elements().removeClass('faded focus-root');
    renderEmpty();
  }
});

// ======================= FILTERS =======================

const nodeTypes = ['Guideline', 'Recommendation', 'Strategy', 'Condition', 'Procedure', 'Observation'];
const edgeTypes = ['FROM_GUIDELINE', 'FOR_CONDITION', 'OFFERS_STRATEGY', 'INCLUDES_ACTION', 'EXCLUDED_BY', 'TRIGGERED_BY', 'TRIGGERS_FOLLOWUP', 'PREEMPTED_BY', 'SUPERSEDES'];
const guidelines = [
  { id: 'uspstf-crc-2021', label: 'USPSTF 2021', color: '#6b21a8' },
  { id: 'acp-crc-2019', label: 'ACP 2019', color: '#0891b2' }
];
const nodeVisible = Object.fromEntries(nodeTypes.map(t => [t, true]));
const edgeVisible = Object.fromEntries(edgeTypes.map(t => [t, true]));
const guidelineVisible = Object.fromEntries(guidelines.map(g => [g.id, true]));

// Derive source guideline(s) for Rec and Strategy nodes.
// Rec: single source (FROM_GUIDELINE outgoing edge target).
// Strategy: can belong to multiple guidelines; derive a set from all incoming OFFERS_STRATEGY edges.
cy.nodes('[type = "Recommendation"]').forEach(n => {
  if (n.data('source_guideline_id')) return;
  const e = n.outgoers('edge[type = "FROM_GUIDELINE"]').first();
  if (e.nonempty()) n.data('source_guideline_id', e.target().id());
});
cy.nodes('[type = "Strategy"]').forEach(n => {
  const sources = new Set();
  n.incomers('edge[type = "OFFERS_STRATEGY"]').forEach(inEdge => {
    const rec = inEdge.source();
    const e = rec.outgoers('edge[type = "FROM_GUIDELINE"]').first();
    if (e.nonempty()) sources.add(e.target().id());
  });
  n.data('source_guideline_ids', Array.from(sources));
});

function buildFilterCheckbox(type, visibilityMap, kind) {
  const colorObj = kind === 'node' ? typeColors[type] : null;
  const swatch = kind === 'node'
    ? `<span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${colorObj.bg}; border:2px solid ${colorObj.border}"></span>`
    : `<span style="display:inline-block; width:14px; height:2px; background:${edgeColors[type] || '#94a3b8'}"></span>`;
  const label = document.createElement('label');
  label.className = 'chk';
  label.innerHTML = `<input type="checkbox" checked data-type="${type}" data-kind="${kind}"> ${swatch} ${type}`;
  const input = label.querySelector('input');
  input.addEventListener('change', () => {
    visibilityMap[type] = input.checked;
    label.classList.toggle('off', !input.checked);
    applyFilters();
  });
  return label;
}

const nodeFilterEl = document.getElementById('node-filters');
const edgeFilterEl = document.getElementById('edge-filters');
const guidelineFilterEl = document.getElementById('guideline-filters');
nodeTypes.forEach(t => nodeFilterEl.appendChild(buildFilterCheckbox(t, nodeVisible, 'node')));
edgeTypes.forEach(t => edgeFilterEl.appendChild(buildFilterCheckbox(t, edgeVisible, 'edge')));

// Guideline filter checkboxes (custom builder so we can show publisher color swatches)
guidelines.forEach(g => {
  const label = document.createElement('label');
  label.className = 'chk';
  label.innerHTML = `<input type="checkbox" checked data-type="${g.id}" data-kind="guideline">
    <span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${g.color}"></span> ${g.label}`;
  const input = label.querySelector('input');
  input.addEventListener('change', () => {
    guidelineVisible[g.id] = input.checked;
    label.classList.toggle('off', !input.checked);
    applyFilters();
  });
  guidelineFilterEl.appendChild(label);
});

function nodeMatchesGuidelineFilter(n) {
  const t = n.data('type');
  // Guideline node: match its own id
  if (t === 'Guideline') return guidelineVisible[n.id()];
  // Rec: single source_guideline_id
  if (t === 'Recommendation') {
    const src = n.data('source_guideline_id');
    if (src) return guidelineVisible[src];
  }
  // Strategy: visible if ANY of its source guidelines is on (shared Strategies
  // belong to multiple guidelines via parallel OFFERS_STRATEGY edges)
  if (t === 'Strategy') {
    const srcs = n.data('source_guideline_ids') || [];
    if (srcs.length === 0) return true;
    return srcs.some(g => guidelineVisible[g]);
  }
  // Clinical entities (Condition, Procedure, Observation): shared; only hide if ALL guidelines are off
  return Object.values(guidelineVisible).some(v => v);
}

function applyFilters() {
  cy.batch(() => {
    cy.nodes().forEach(n => {
      const typeOk = nodeVisible[n.data('type')];
      const gOk = nodeMatchesGuidelineFilter(n);
      if (typeOk && gOk) n.removeClass('hidden');
      else n.addClass('hidden');
    });
    cy.edges().forEach(e => {
      const typeOk = edgeVisible[e.data('type')];
      const endpointsOk = !e.source().hasClass('hidden') && !e.target().hasClass('hidden');
      if (typeOk && endpointsOk) e.removeClass('hidden');
      else e.addClass('hidden');
    });
  });
}

function setAllFilters(on) {
  nodeTypes.forEach(t => nodeVisible[t] = on);
  edgeTypes.forEach(t => edgeVisible[t] = on);
  guidelines.forEach(g => guidelineVisible[g.id] = on);
  document.querySelectorAll('.filters input[type="checkbox"]').forEach(cb => {
    cb.checked = on;
    cb.parentElement.classList.toggle('off', !on);
  });
  applyFilters();
}

document.getElementById('filters-all').addEventListener('click', () => setAllFilters(true));
document.getElementById('filters-none').addEventListener('click', () => setAllFilters(false));
document.getElementById('clear-focus').addEventListener('click', () => {
  cy.elements().removeClass('faded focus-root');
  cy.$(':selected').unselect();
  renderEmpty();
});
</script>
