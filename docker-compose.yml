# Clinical Knowledge Graph — v0 full-stack compose
#
# Brings up Neo4j + API + UI wired together.
# Usage: docker compose up --build
#
# Neo4j password is dev-only — do NOT use in production.

services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password123
      # Disable auth warning in logs
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - ckg-neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  seed:
    # One-shot container: waits for Neo4j healthy, applies constraints + seed,
    # then exits 0. Idempotent — safe to re-run.
    image: neo4j:5-community
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./graph:/graph:ro
      - ./scripts/seed.sh:/seed.sh:ro
    entrypoint: ["/bin/bash", "/seed.sh"]
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123

  api:
    build:
      context: ./api
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
    ports:
      - "8000:8000"
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    # API_BASE_URL is intentionally NOT set. The browser makes API calls
    # client-side, so it needs http://localhost:8000 (the default baked
    # into the Next.js build). The API port is exposed to the host above.
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  ckg-neo4j-data:
