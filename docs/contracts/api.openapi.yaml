openapi: 3.1.0
info:
  title: Clinical Knowledge Graph API
  version: 0.1.0
  description: |
    v0 (ADR 0013, 0014). Internal REST API between the UI, downstream agents, and the Neo4j
    knowledge graph. Two concern areas:
      - /evaluate — deterministic evaluator. Accepts a PatientContext, returns an EvalTrace.
      - /nodes, /nodes/{id}/neighbors, /search — read-only graph query for the Explore UI.

    No direct Cypher passthrough (ADR 0005). New traversal capabilities become new endpoints.

servers:
  - url: http://localhost:8000
    description: Local dev

tags:
  - name: evaluate
    description: Trace-producing evaluator.
  - name: query
    description: Read-only graph queries for the Explore UI.
  - name: meta
    description: Version and health.

paths:
  /healthz:
    get:
      tags: [meta]
      summary: Liveness probe.
      responses:
        "200":
          description: OK

  /version:
    get:
      tags: [meta]
      summary: Version stamps currently served.
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionStamp"

  /evaluate:
    post:
      tags: [evaluate]
      summary: Run the evaluator against a PatientContext, return the EvalTrace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
      responses:
        "200":
          description: Completed evaluation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalTrace"
        "400":
          description: Invalid PatientContext.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"

  /nodes/{id}:
    get:
      tags: [query]
      summary: Fetch one node by stable id.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Node payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphNode"
        "404":
          description: Not found.

  /nodes/{id}/neighbors:
    get:
      tags: [query]
      summary: Fetch a node plus its inbound and outbound neighbors.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: depth
          description: Traversal depth. v0 accepts 1 only.
          schema: { type: integer, minimum: 1, maximum: 1, default: 1 }
        - in: query
          name: edge_types
          description: Optional filter to these edge labels.
          schema:
            type: array
            items: { type: string }
      responses:
        "200":
          description: Neighborhood subgraph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subgraph"
        "404":
          description: Not found.

  /subgraph:
    get:
      tags: [query]
      summary: Fetch the whole-forest subgraph for selected guideline domains.
      description: |
        Returns all guideline-scoped nodes with the requested domain labels
        plus all shared entity nodes referenced by any of them. Edges included
        only when both endpoints are in the returned node set. Default (no
        `domains` param) returns all guidelines. Empty `domains=` returns
        only shared entities.
      parameters:
        - in: query
          name: domains
          description: |
            Comma-separated domain labels (USPSTF, ACC_AHA, KDIGO, ADA).
            Default (absent) returns all. Empty string returns shared entities only.
          schema: { type: string }
      responses:
        "200":
          description: Subgraph covering the requested domains.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForestSubgraph"

  /guidelines:
    get:
      tags: [query]
      summary: List all guideline metadata for the UI index page.
      description: |
        Returns metadata for every guideline in the graph, including title,
        version, domain, rec count, author-declared coverage summary,
        seed hash, and last-updated timestamp. Used by the guideline index
        page to render cards.
      responses:
        "200":
          description: Guideline metadata list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuidelineMeta"

  /interactions:
    get:
      tags: [query]
      summary: Cross-guideline interaction structure for the Interactions view.
      description: |
        Returns PREEMPTED_BY and MODIFIES edges with their participating
        Recommendation endpoints, guideline metadata, and shared entity
        references. One bulk fetch for the /interactions UI.
      parameters:
        - in: query
          name: type
          description: "Edge type filter: preemption, modifier, or both."
          schema:
            type: string
            enum: [preemption, modifier, both]
            default: both
        - in: query
          name: guidelines
          description: |
            Comma-separated guideline slugs (uspstf, acc-aha, kdigo).
            Default returns all.
          schema: { type: string }
      responses:
        "200":
          description: Cross-guideline interactions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionsResponse"

  /search:
    get:
      tags: [query]
      summary: Search nodes by label prefix or code.
      parameters:
        - in: query
          name: q
          description: Free-text match against node labels and human-readable names.
          schema: { type: string }
        - in: query
          name: code
          description: Exact-match on any code in the node's code list.
          schema:
            type: object
            properties:
              system: { type: string, enum: [snomed, icd10, loinc, rxnorm, cpt] }
              code: { type: string }
        - in: query
          name: node_types
          description: Restrict to these node labels.
          schema:
            type: array
            items: { type: string, enum: [Guideline, Recommendation, Strategy, Condition, Observation, Medication, Procedure] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Matching nodes.
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/GraphNode" }

components:
  schemas:
    VersionStamp:
      type: object
      required: [spec_tag, graph_version, evaluator_version]
      properties:
        spec_tag: { type: string }
        graph_version: { type: string }
        evaluator_version: { type: string }

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              message: { type: string }

    EvaluateRequest:
      type: object
      required: [patient_context]
      properties:
        patient_context:
          description: Must validate against patient-context.schema.json.
          $ref: "./patient-context.schema.json"
        options:
          type: object
          properties:
            recompute_risk_scores:
              type: boolean
              default: false
              description: Force recomputation even when a recent supplied score exists.

    EvalTrace:
      description: |
        Must validate against eval-trace.schema.json.
        v1 (F21): every event carries guideline_id; response includes
        per-guideline rec lists (recommendations_by_guideline) plus a
        flat recommendation list for backwards-compatible consumers.
      $ref: "./eval-trace.schema.json"

    GraphNode:
      type: object
      required: [id, labels, properties]
      properties:
        id: { type: string, description: "Stable node id, e.g., med:atorvastatin." }
        labels:
          type: array
          items: { type: string }
          description: "Neo4j labels, e.g., [Medication]."
        properties:
          type: object
          additionalProperties: true
        codes:
          type: array
          description: Optional surfacing of the node's code list for quick display.
          items:
            type: object
            required: [system, code]
            properties:
              system: { type: string }
              code: { type: string }
              display: { type: string }

    GraphEdge:
      type: object
      required: [id, type, start, end, properties]
      properties:
        id: { type: string }
        type: { type: string, description: "Edge label, e.g., INCLUDES_ACTION." }
        start: { type: string, description: "Start node id." }
        end: { type: string, description: "End node id." }
        properties:
          type: object
          additionalProperties: true

    ForestSubgraph:
      type: object
      required: [nodes, edges]
      description: |
        Whole-forest subgraph for the Explore UI. Includes guideline-scoped
        nodes for requested domains plus shared entities. Nodes sorted by id;
        edges sorted by (start, end, type).
      properties:
        nodes:
          type: array
          items:
            type: object
            required: [id, labels, properties, domain]
            properties:
              id: { type: string }
              labels:
                type: array
                items: { type: string }
              properties:
                type: object
                additionalProperties: true
              codes:
                type: array
                items:
                  type: object
                  required: [system, code]
                  properties:
                    system: { type: string }
                    code: { type: string }
                    display: { type: string }
              domain:
                type: string
                nullable: true
                enum: [USPSTF, ACC_AHA, KDIGO, ADA, null]
                description: "Domain label for guideline-scoped nodes; null for shared entities."
        edges:
          type: array
          items:
            type: object
            required: [id, type, start, end, properties]
            properties:
              id: { type: string }
              type: { type: string }
              start: { type: string }
              end: { type: string }
              properties:
                type: object
                additionalProperties: true

    GuidelineMeta:
      type: object
      required: [id, domain, title, version, publication_date, citation_url, rec_count, coverage, seed_hash, last_updated_in_graph]
      properties:
        id:
          type: string
          description: "URL-safe slug, e.g., uspstf-statin-2022."
        domain:
          type: string
          nullable: true
          description: "Human-readable domain label (USPSTF, ACC/AHA, KDIGO)."
        title: { type: string }
        version: { type: string }
        publication_date: { type: string }
        citation_url: { type: string }
        rec_count: { type: integer }
        coverage:
          type: object
          nullable: true
          properties:
            modeled:
              type: array
              items:
                type: object
                required: [label, rec_id]
                properties:
                  label: { type: string }
                  rec_id: { type: string }
            deferred:
              type: array
              items: { type: string }
            exit_only:
              type: array
              items: { type: string }
        seed_hash:
          type: string
          nullable: true
          description: "SHA-256 of the guideline seed cypher file."
        last_updated_in_graph: { type: string }

    InteractionsResponse:
      type: object
      required: [guidelines, recommendations, shared_entities, edges]
      description: |
        Cross-guideline interaction structure for the Interactions view.
        Only Recs that participate in at least one edge are included.
      properties:
        guidelines:
          type: array
          items:
            type: object
            required: [id, domain, title]
            properties:
              id: { type: string }
              domain: { type: string }
              title: { type: string }
        recommendations:
          type: array
          items:
            type: object
            required: [id, title, domain, has_preemption_in, has_preemption_out, modifier_count]
            properties:
              id: { type: string }
              title: { type: string }
              domain: { type: string, nullable: true }
              evidence_grade: { type: string, nullable: true }
              has_preemption_in: { type: boolean }
              has_preemption_out: { type: boolean }
              modifier_count: { type: integer }
        shared_entities:
          type: array
          items:
            type: object
            required: [id, type, title]
            properties:
              id: { type: string }
              type: { type: string }
              title: { type: string }
        edges:
          type: array
          items:
            type: object
            required: [type, source, target]
            properties:
              type: { type: string, enum: [PREEMPTED_BY, MODIFIES] }
              source: { type: string }
              target: { type: string }
              edge_priority: { type: integer, nullable: true }
              reason: { type: string, nullable: true }
              nature: { type: string, nullable: true }
              note: { type: string, nullable: true }
              suppressed_by_preemption: { type: boolean, nullable: true }

    Subgraph:
      type: object
      required: [center, nodes, edges]
      properties:
        center: { type: string }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/GraphNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/GraphEdge" }
