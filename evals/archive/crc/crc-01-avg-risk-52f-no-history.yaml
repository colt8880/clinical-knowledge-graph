clinical_rationale: |
  Average-risk adult in the 50-75 band with no prior screening. Both USPSTF
  Grade A and ACP 2019 screen-50-75 fire. All strategies offered by each
  guideline are due (no satisfying actions in history).

  Sanity check: no preemption (no higher-risk indicators), no cascade
  (no positive screening result), no data gaps (family_history completeness
  is 'populated').

