id: crc-02-avg-risk-47m-grade-b
title: "47M, average risk, 45-49 band (Grade B)"
guideline_refs:
  - uspstf-crc-2021: "Recommendation Summary, Grade B"
clinical_rationale: |
  Average-risk adult in the 45-49 band. USPSTF 2021 extended CRC screening
  to age 45 with Grade B evidence. Grade A (50-75) does not apply; Grade B
  does. ACP 2019 starts at 50, so it does not fire here — coverage gap is
  the expected finding and should be visible to the consumer.

  All seven USPSTF strategies are offered and due.

