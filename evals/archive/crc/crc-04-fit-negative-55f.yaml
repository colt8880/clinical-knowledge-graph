id: crc-04-fit-negative-55f
title: "55F, negative FIT 6 months ago"
guideline_refs:
  - uspstf-crc-2021: "Recommendation Summary, Grade A"
  - acp-crc-2019: "Guidance Statement 1 & 2"
clinical_rationale: |
  Classic 'up-to-date via FIT' case. Negative FIT within the P1Y USPSTF
  lookback and within the P2Y ACP lookback satisfies the FIT-alone strategy
  under both guidelines. The combined flex-sig+FIT strategy is partial
  (FIT satisfied, flex-sig missing); other strategies are due.

  Exercises `expects: negative` on `INCLUDES_ACTION` with a positive outcome:
  the resolved value-set for (obs:fit, negative) includes LOINC answer
  LA6577-6.

