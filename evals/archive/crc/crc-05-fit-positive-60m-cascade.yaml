id: crc-05-fit-positive-60m-cascade
title: "60M, positive FIT 2 weeks ago"
guideline_refs:
  - uspstf-crc-2021: "Recommendation Summary, Grade A"
  - uspstf-crc-2021: "Clinical Considerations, Screening Test Follow-up"
clinical_rationale: |
  Cascade case. A positive FIT does NOT satisfy the screening Strategy
  (`expects: negative` fails because the value-set for (obs:fit, negative)
  does not include LA6576-8 Positive). Screening Rec stays due. The
  diagnostic-followup Rec fires via `TRIGGERED_BY` on obs:fit with a positive
  value inside P30D.

  Exercises: (1) result-conditional satisfaction failing for positive result,
  (2) cascade firing via observation_result trigger, (3) the combined
  flex-sig+FIT strategy correctly reporting 'unsatisfied' on the FIT action
  (not 'satisfied' just because a FIT record exists).

  ACP fires identically for the screening Rec; for brevity the Rec-level
  output is included below.

