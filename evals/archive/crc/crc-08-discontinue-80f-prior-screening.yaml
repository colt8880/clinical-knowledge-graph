id: crc-08-discontinue-80f-prior-screening
title: "80F with two prior colonoscopies"
guideline_refs:
  - uspstf-crc-2021: "Recommendation Summary, Grade C"
  - acp-crc-2019: "Guidance Statement 3"
clinical_rationale: |
  80yo in the Grade C band (76-85) with documented prior screening history.
  Both USPSTF Grade C ('selectively offer, shared decision') and ACP
  discontinue-over-75 fire. Neither preempts the other; both surface for the
  consumer to weigh.

  Exercises: (1) both shared-decision Recs coexisting, (2) `has_any_prior_screening`
  predicate returning true against completed colonoscopies, (3) null-cadence
  strategies correctly reported as due (no prior SDM/discontinuation
  discussion recorded).

  Grade A (50-75) and Grade B (45-49) do not fire (age); ACP screen-50-75
  does not fire (age >75).

